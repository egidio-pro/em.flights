<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EM Flights</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

    body{
      width:310px;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter','Segoe UI',sans-serif;
      background:#F2F2F7; /* iOS system background */
      color:#1C1C1E;
    }

    /* ── Header ── */
    .hd{
      background:linear-gradient(135deg,#0040C8 0%,#0071E3 100%);
      padding:20px 18px 16px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
    }
    .hd-logo{
      width:48px; height:48px; border-radius:14px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      display:flex; align-items:center; justify-content:center;
    }
    .hd-logo svg{ width:26px; height:26px; }
    .hd-name{ color:#fff; font-size:17px; font-weight:700; letter-spacing:-0.3px; }
    .hd-sub{ color:rgba(255,255,255,0.7); font-size:11px; font-weight:500; letter-spacing:.5px; text-transform:uppercase; }

    /* ── Body ── */
    .body{ padding:12px 12px 16px; display:flex; flex-direction:column; gap:8px; }

    /* iOS grouped list card */
    .card{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
    }

    .field{
      display:flex; align-items:center;
      padding:11px 14px;
      gap:10px;
      border-bottom:1px solid #E5E5EA;
    }
    .field:last-child{ border-bottom:none; }

    .field-label{
      flex:1;
      font-size:15px;
      color:#1C1C1E;
    }

    input[type="number"]{
      width:88px;
      padding:6px 10px;
      border:1.5px solid #E5E5EA;
      border-radius:8px;
      font-size:15px;
      font-weight:600;
      text-align:right;
      color:#1C1C1E;
      background:#F9F9F9;
      font-family:inherit;
      -moz-appearance:textfield;
      transition:border-color .15s;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button{ -webkit-appearance:none; }
    input[type="number"]:focus{
      outline:none;
      border-color:#0071E3;
      background:#fff;
      box-shadow:0 0 0 3px rgba(0,113,227,0.15);
    }

    /* Info chip */
    .chip{
      background:#E8F4FF;
      border:1px solid rgba(0,113,227,0.2);
      border-radius:10px;
      padding:9px 13px;
      font-size:12.5px;
      color:#0040C8;
      line-height:1.5;
    }

    /* Buttons */
    .btn{
      width:100%; padding:13px;
      border:none; border-radius:12px;
      font-size:15px; font-weight:600;
      cursor:pointer; font-family:inherit;
      transition:all .15s ease;
    }
    .btn-primary{
      background:#0071E3;
      color:#fff;
      box-shadow:0 2px 8px rgba(0,113,227,0.35);
    }
    .btn-primary:hover{ background:#0062CC; }
    .btn-primary:active{ transform:scale(.98); }

    .btn-secondary{
      background:#fff;
      color:#0071E3;
      border:1.5px solid #D1D1D6;
      font-weight:500;
    }
    .btn-secondary:hover{ border-color:#0071E3; }
    .btn-secondary.off{ color:#FF3B30; border-color:#FFD7D6; background:#FFF5F5; }

    /* Status toast */
    .toast{
      font-size:13px; font-weight:500;
      text-align:center;
      padding:8px 12px; border-radius:9px;
      opacity:0; transform:translateY(4px);
      transition:all .2s ease; pointer-events:none;
    }
    .toast.show{ opacity:1; transform:translateY(0); }
    .toast.ok{ background:#E8F8EE; color:#1A7F4B; }
    .toast.err{ background:#FFF0F0; color:#C0392B; }

    .footer{ text-align:center; padding:0 0 12px; font-size:11px; color:#AEAEB2; }
  </style>
</head>
<body>

<div class="hd">
  <div class="hd-logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M22 2L11 13" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="hd-name">EM Flights</div>
  <div class="hd-sub">Calculadora de margen</div>
</div>

<div class="body">

  <div class="card">
    <div class="field">
      <span class="field-label">Pasajeros</span>
      <input type="number" id="passengers" min="1" max="20" value="1">
    </div>
  </div>
  <div class="chip" id="configInfo">Cargando configuración…</div>


  <div class="card">
    <div class="field" style="cursor:pointer" id="saveBtn">
      <span class="field-label" style="color:#0071E3;font-weight:600;">Guardar configuración</span>
    </div>
    <div class="field" style="cursor:pointer" id="toggleBtn">
      <span class="field-label" id="toggleLabel" style="font-weight:500;">Calculadora activa</span>
      <span id="toggleDot" style="width:10px;height:10px;border-radius:50%;background:#34C759;flex-shrink:0;"></span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</div>

<div class="footer">v1.0.0 · EM Flights</div>

<script src="popup.js"></script>
</body>
</html>
