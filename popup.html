<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EM Flights - Config</title>
  <style>
    :root {
      --bg: rgba(255, 255, 255, 0.8);
      --border: rgba(255, 255, 255, 0.3);
      --accent: #0071E3;
      --text: #1C1C1E;
      --text-sec: #3C3C43CC;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: rgba(28, 28, 30, 0.85);
        --border: rgba(255, 255, 255, 0.1);
        --text: #F2F2F7;
        --text-sec: #AEAEB2;
      }
    }

    *{ margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
      background: var(--bg);
      backdrop-filter: blur(20px);
      color: var(--text);
      overflow: hidden;
    }

    .hd {
      background: linear-gradient(135deg, #0040C8 0%, #0071E3 100%);
      padding: 24px 18px;
      text-align: center;
      color: white;
    }

    .hd-logo {
      width: 44px; height: 44px; margin: 0 auto 12px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .hd-logo svg { width: 22px; height: 22px; }
    .hd-name { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .hd-ver { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    @media (prefers-color-scheme: dark) {
      .card { background: rgba(255, 255, 255, 0.05); }
    }

    .field-label { font-size: 15px; font-weight: 600; }

    .toggle-dot {
      width: 12px; height: 12px; border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dev-info {
      text-align: center; padding: 10px;
      font-size: 11px; color: var(--text-sec);
      border-top: 1px solid var(--border);
    }
    .dev-name { font-weight: 700; color: var(--accent); }

    .toast {
      position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
      padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
      opacity: 0; pointer-events: none; transition: all 0.3s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    .toast.ok { background: #34C759; color: white; }

    #toggleBtn { cursor: pointer; transition: transform 0.1s; }
    #toggleBtn:active { transform: scale(0.98); }
  </style>
</head>
<body>

<div class="hd">
  <div class="hd-logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="hd-name">EM Flights</div>
  <div class="hd-ver">v1.1.0 · Calculadora</div>
</div>

<div class="body">
  <div class="card" id="toggleBtn">
    <span class="field-label" id="toggleLabel">Cargando...</span>
    <span class="toggle-dot" id="toggleDot"></span>
  </div>

  <div class="card" style="justify-content: center; border-style: dashed; opacity: 0.8;">
    <span style="font-size: 11px; text-align: center; color: var(--text-sec);">
      Los ajustes de margen y pasajeros se realizan directamente en la ventana flotante al hacer clic en un precio.
    </span>
  </div>
</div>

<div class="dev-info">
  Desarrollado por <span class="dev-name">Egidio</span>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
